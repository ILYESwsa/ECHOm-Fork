name: Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Restore google-services.json
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$DATA" ]; then echo "$DATA" > app/google-services.json; fi

      - name: Generate debug keystore
        run: |
          mkdir -p "$HOME/.android" app
          keytool -genkeypair -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storetype JKS
          cp "$HOME/.android/debug.keystore" app/persistent-debug.keystore

      - name: Build Debug APK
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleUniversalGmsDebug --stacktrace

      - name: Collect APK
        id: apk
        run: |
          VER=$(grep 'versionName =' app/build.gradle.kts | head -1 | awk -F'"' '{print $2}')
          SHA=$(git rev-parse --short HEAD)
          mkdir -p dist
          find app/build/outputs/apk/ -name "*.apk" | head -1 | xargs -I{} cp {} dist/Echo-${VER}-debug-${SHA}.apk
          echo "name=Echo-${VER}-debug-${SHA}.apk" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: dist/*.apk
          retention-days: 7
          if-no-files-found: error
