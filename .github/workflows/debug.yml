name: Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-debug-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-debug-
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_CONTENT" ]; then
            printf "%s" "$GOOGLE_SERVICES_CONTENT" > app/google-services.json
          fi

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storetype JKS
          # Also put a copy where persistentDebug signingConfig expects it
          mkdir -p app
          cp "$HOME/.android/debug.keystore" app/persistent-debug.keystore

      - name: Build Debug APK
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET:  ${{ secrets.LASTFM_SECRET }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleUniversalGmsDebug --stacktrace

      - name: Rename APK
        id: apk
        run: |
          VERSION=$(grep 'versionName =' app/build.gradle.kts | head -1 | awk -F'"' '{print $2}')
          SHA=$(git rev-parse --short HEAD)
          NAME="Echo-${VERSION}-debug-${SHA}.apk"
          mkdir -p dist
          find app/build/outputs/apk/ -name "*.apk" | head -1 | xargs -I{} cp {} "dist/$NAME"
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "sha=$SHA"   >> $GITHUB_OUTPUT
          echo "ver=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload app-debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: dist/*.apk
          retention-days: 7
          if-no-files-found: error
